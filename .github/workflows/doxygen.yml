name: Deploy Doxygen to GitHub Pages

on:
  push:
    branches:
      - main  # Change this to your sub-branch name if testing there first

permissions:
  contents: write  # Crucial for creating/updating the gh-pages branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate and Deploy Doxygen Docs
        uses: DenverCoder1/doxygen-github-pages-action@v2.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: gh-pages
          folder: html  # Default Doxygen output; change if your Doxyfile says otherwise
          config_file: Doxyfile
