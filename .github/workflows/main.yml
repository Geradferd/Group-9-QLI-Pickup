name: Generate and Deploy Doxygen Docs

on:
  push:
    branches:
      - main # Or your default branch name (e.g., master, development)

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to write the new documentation files

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Doxygen and Graphviz
        run: sudo apt-get update && sudo apt-get install -y doxygen graphviz

      - name: Generate Doxygen Documentation
        run: doxygen Doxyfile

      - name: Create .nojekyll file
        run: touch docs/html/.nojekyll # Prevents GitHub Pages from treating it as a Jekyll site

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages # The branch to deploy the documentation to
          folder: docs/html # The folder containing the generated HTML files
